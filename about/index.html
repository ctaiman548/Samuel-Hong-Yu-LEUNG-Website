<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Samuel Hong-Yu LEUNG | Composer - About</title>
    <meta name="description" content="Samuel Hong-Yu LEUNG is a Hong Kong-born composer pursuing a Master’s degree in composition with Fabien Lévy and Mauro Lanza at the Conservatoire of Music and Theatre »Felix Mendelssohn Bartholdy« Leipzig, Germany. He graduated from the Chinese University of Hong Kong (CUHK) with a first-class honours Bachelor of Arts in Music. His work Variations for string quartet was selected to the International Society for Contemporary Music (ISCM) World New Music Days 2025 (Portugal) to represent the Hong Kong sector; another work Excursion II was also selected to represent Hong Kong at the 70th International Rostrum of Composers (Lithuania) and is nominated as one of the five recommended works in the under-30 category. Remarkably, his piano solo Tastaturlust has already been performed three times at different festivals and competitions in Germany." />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <style>
      /* Hide scrollbar for Chrome, Safari and Opera */
      .no-scrollbar::-webkit-scrollbar {
          display: none;
      }
      /* Hide scrollbar for IE, Edge and Firefox */
      .no-scrollbar {
          -ms-overflow-style: none;  /* IE and Edge */
          scrollbar-width: none;  /* Firefox */
      }
      
      /* Custom scrollbar */
      .custom-scrollbar::-webkit-scrollbar {
          width: 4px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
          background: transparent;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
          background: rgba(156, 163, 175, 0.5); /* gray-400 with opacity */
          border-radius: 4px;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb:hover {
          background: rgba(107, 114, 128, 0.8); /* gray-500 with opacity */
      }
      .custom-scrollbar {
          scrollbar-width: thin;
          scrollbar-color: rgba(156, 163, 175, 0.5) transparent;
      }

      /* Always visible scrollbar */
      .always-visible-scrollbar::-webkit-scrollbar {
          width: 6px;
      }
      .always-visible-scrollbar::-webkit-scrollbar-track {
          background: transparent;
      }
      .always-visible-scrollbar::-webkit-scrollbar-thumb {
          background-color: rgba(156, 163, 175, 0.6); /* gray-400 with opacity */
          border-radius: 10px;
      }
      .always-visible-scrollbar::-webkit-scrollbar-thumb:hover {
          background-color: rgba(107, 114, 128, 0.8); /* gray-500 with opacity */
      }
      
      /* Transparent scrollbar (takes up space but invisible) */
      .transparent-scrollbar::-webkit-scrollbar {
          width: 6px;
      }
      .transparent-scrollbar::-webkit-scrollbar-track {
          background: transparent;
      }
      .transparent-scrollbar::-webkit-scrollbar-thumb {
          background-color: transparent;
      }

      /* Firefox fallback */
      @supports (-moz-appearance:none) {
          .always-visible-scrollbar {
              scrollbar-width: thin;
              scrollbar-color: rgba(156, 163, 175, 0.6) transparent;
          }
          .transparent-scrollbar {
              scrollbar-width: thin;
              scrollbar-color: transparent transparent;
          }
      }

      body {
        background-color: #fdfdfd;
        color: #111111;
        overflow: hidden; /* Prevent body scroll, handle in app */
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/main.tsx"></script>
  </body>
</html>
